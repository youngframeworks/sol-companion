name: Label sol-task issues

on:
  issues:
    types:
      - opened
      - edited

jobs:
  label-sol-task:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add sol-task label if template used
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';

            const isSolTask =
              title.startsWith('[sol-task]') ||
              body.includes('Sol Task') ||
              body.includes('Suggested workflow') ||
              body.includes('Acceptance criteria');

            if (!isSolTask) return;

            const labels = context.payload.issue.labels.map(l => l.name);
            if (labels.includes('sol-task')) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['sol-task'],
            });
