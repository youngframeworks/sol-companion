name: Sol task CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt ruff pytest 2>/dev/null || true

      - name: Lint (ruff)
        run: ruff check . --select E,W,F --ignore E501 || true

      - name: Run tests
        run: |
          if [ -d tests ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            python -m pytest tests/ -x -q --tb=short
          else
            echo "No tests found — skipping."
          fi

  validate-sol-os-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Confirm .vscode/sol-os exists and is contracts-only
        run: |
          if [ ! -d .vscode/sol-os ]; then
            echo "Warning: .vscode/sol-os not present — run sync_os_to_project."
            exit 0
          fi
          VIOLATIONS=$(find .vscode/sol-os -type f ! -name '*.md' ! -name '.sync-manifest.sha256' 2>/dev/null || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "Boundary violation: non-contract files under .vscode/sol-os:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "sol-os mirror boundary check passed."
