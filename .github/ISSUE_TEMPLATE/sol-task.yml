name: Sol Task
description: Submit a task for SolManagerAgent to plan and execute.
title: "[sol-task] "
labels:
  - sol-task
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of what you want to accomplish.
      placeholder: "e.g. Add voice mode to Sol Companion"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: >
        Background, motivation, or relevant observations. Link to existing
        Issues, PRs, or docs if applicable.
    validations:
      required: false

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: What must be true when this task is complete?
      placeholder: |
        - Requirement 1
        - Requirement 2
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Specific, testable conditions for done.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: workflow
    attributes:
      label: Suggested workflow
      description: SolManagerAgent will confirm the final choice.
      options:
        - feature_delivery
        - bugfix
        - refactor
        - other
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: >
        Anything that must NOT be changed, boundaries to respect, or policies
        that apply.
    validations:
      required: false
