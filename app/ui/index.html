<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sol Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #fdfcf8;
        --ink: #202321;
        --muted: #6b706d;
        --line: #d8ddd8;
        --accent: #7f9a84;
        --glow: rgba(127, 154, 132, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: radial-gradient(circle at 20% 20%, #f5f6ef 0%, transparent 45%),
          radial-gradient(circle at 80% 10%, #f7f1e8 0%, transparent 40%),
          var(--paper);
        font-family: "Manrope", "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .shell {
        width: min(920px, 100%);
        min-height: min(88vh, 900px);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 14px 45px rgba(18, 24, 20, 0.08), 0 1px 0 rgba(255, 255, 255, 0.9) inset;
        overflow: hidden;
      }

      .head {
        padding: 22px 22px 16px;
        border-bottom: 1px solid var(--line);
      }

      .head h1 {
        margin: 0;
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(2rem, 3.5vw, 2.8rem);
        font-weight: 500;
        letter-spacing: 0.01em;
      }

      .head p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.96rem;
      }

      .modebar {
        display: grid;
        gap: 10px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(251, 253, 250, 0.95), rgba(248, 249, 244, 0.86));
      }

      .mode-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mode-btn,
      .action-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        background: white;
        color: var(--ink);
        font-size: 0.85rem;
        cursor: pointer;
      }

      .mode-btn.active,
      .action-btn.active {
        background: #e8f1e7;
        border-color: #c3d4c2;
      }

      .mode-hint {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .history {
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bubble {
        max-width: 86%;
        padding: 14px 16px;
        border-radius: 18px;
        line-height: 1.45;
        animation: rise 220ms ease-out;
        white-space: pre-wrap;
      }

      .bubble.user {
        margin-left: auto;
        background: #f1f4ef;
        border: 1px solid #d7ded7;
      }

      .bubble.sol {
        margin-right: auto;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: 0 10px 24px rgba(15, 24, 20, 0.06);
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.75), rgba(253, 252, 248, 0.9));
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
      }

      input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        font: inherit;
        background: white;
        outline: none;
        transition: box-shadow 150ms ease, border-color 150ms ease;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--glow);
      }

      button {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0 14px;
        background: white;
        color: var(--ink);
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        background: #eef4ed;
        border-color: #cbd8cb;
      }

      button:hover {
        filter: brightness(0.98);
      }

      .hint {
        margin: 8px 2px 0;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .summary-box {
        margin: 0 20px 16px;
        padding: 12px 14px;
        border: 1px dashed #c8d3c8;
        border-radius: 14px;
        background: #f8fbf6;
        color: #34413a;
        font-size: 0.9rem;
        display: none;
      }

      .summary-box.visible {
        display: block;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 680px) {
        .shell {
          min-height: 92vh;
          border-radius: 20px;
        }

        .modebar {
          padding: 10px 12px;
        }

        .mode-row {
          gap: 6px;
        }

        .mode-btn,
        .action-btn {
          font-size: 0.8rem;
          padding: 7px 10px;
        }

        .row {
          grid-template-columns: 1fr;
        }

        button {
          height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="head">
        <h1>Sol Companion</h1>
        <p>A reflective local space for gentle inner dialogue.</p>
      </header>

      <section class="modebar">
        <div class="mode-row" id="modeRow">
          <button class="mode-btn active" data-mode="companion">Companion</button>
          <button class="mode-btn" data-mode="presence">Presence</button>
          <button class="mode-btn" data-mode="insight">Insight</button>
          <button class="mode-btn" data-mode="journal">Journal</button>
        </div>
        <div class="mode-row">
          <button id="breathBtn" class="action-btn">Breath Grounding</button>
          <button id="voiceBtn" class="action-btn">Voice Mode</button>
          <button id="summaryBtn" class="action-btn">Session Summary</button>
        </div>
        <div class="mode-hint" id="modeHint">Companion mode: warm reflective conversation.</div>
      </section>

      <section id="history" class="history"></section>
      <aside id="summaryBox" class="summary-box"></aside>

      <footer class="composer">
        <div class="row">
          <input id="input" type="text" placeholder="Share what is present right now..." autocomplete="off" />
          <button id="send" class="primary">Send</button>
          <button id="reset">Reset Space</button>
        </div>
        <div class="hint">Press Enter to send.</div>
      </footer>
    </main>

    <script>
      const historyEl = document.getElementById("history");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const resetBtn = document.getElementById("reset");
      const modeRow = document.getElementById("modeRow");
      const modeHint = document.getElementById("modeHint");
      const breathBtn = document.getElementById("breathBtn");
      const voiceBtn = document.getElementById("voiceBtn");
      const summaryBtn = document.getElementById("summaryBtn");
      const summaryBox = document.getElementById("summaryBox");
      const sessionId = "sol-default";
      let activeMode = "companion";
      let breathGrounding = false;
      let voiceMode = false;
      let recognition = null;

      const modeHints = {
        companion: "Companion mode: warm reflective conversation.",
        presence: "Presence mode: metaphorical, slow, and deep pacing.",
        insight: "Insight mode: pattern reflection and gentle meaning-making.",
        journal: "Journal mode: writing-focused reflection and memory refinement.",
      };

      function appendMessage(text, role) {
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        div.textContent = text;
        historyEl.appendChild(div);
        historyEl.scrollTop = historyEl.scrollHeight;
        if (role === "sol" && voiceMode && "speechSynthesis" in window) {
          const u = new SpeechSynthesisUtterance(text);
          u.rate = activeMode === "presence" ? 0.84 : 0.94;
          u.pitch = 0.95;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(u);
        }
      }

      function setMode(nextMode) {
        activeMode = nextMode;
        for (const btn of modeRow.querySelectorAll(".mode-btn")) {
          btn.classList.toggle("active", btn.dataset.mode === nextMode);
        }
        modeHint.textContent = modeHints[nextMode] || modeHints.companion;
      }

      function toggleBreath() {
        breathGrounding = !breathGrounding;
        breathBtn.classList.toggle("active", breathGrounding);
      }

      function setupVoiceRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          appendMessage("Voice mode is not supported in this browser.", "sol");
          return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.onresult = (event) => {
          const text = event.results?.[0]?.[0]?.transcript || "";
          if (text) {
            inputEl.value = text;
            sendMessage();
          }
        };
        recognition.onerror = () => {
          appendMessage("I heard a little static. You can type instead.", "sol");
        };
      }

      function toggleVoice() {
        voiceMode = !voiceMode;
        voiceBtn.classList.toggle("active", voiceMode);
        if (voiceMode && !recognition) {
          setupVoiceRecognition();
        }
        if (voiceMode && recognition) {
          recognition.start();
        }
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        appendMessage(text, "user");
        inputEl.value = "";
        inputEl.focus();

        try {
          const res = await fetch("/sol", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              session_id: sessionId,
              mode: activeMode,
              breath_grounding: breathGrounding,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Request failed");
          appendMessage(data.response, "sol");
        } catch (err) {
          appendMessage("A quiet interruption happened. Please try again.", "sol");
          console.error(err);
        }
      }

      async function resetSpace() {
        try {
          await fetch("/sol/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
        } catch (err) {
          console.error(err);
        }
        historyEl.innerHTML = "";
        summaryBox.textContent = "";
        summaryBox.classList.remove("visible");
        inputEl.value = "";
        inputEl.focus();
      }

      async function requestSummary() {
        try {
          const res = await fetch("/sol/summary", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "Summary failed");
          summaryBox.textContent = data.summary;
          summaryBox.classList.add("visible");
        } catch (err) {
          summaryBox.textContent = "Could not create session summary yet.";
          summaryBox.classList.add("visible");
          console.error(err);
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      resetBtn.addEventListener("click", resetSpace);
      summaryBtn.addEventListener("click", requestSummary);
      breathBtn.addEventListener("click", toggleBreath);
      voiceBtn.addEventListener("click", toggleVoice);
      modeRow.addEventListener("click", (ev) => {
        const target = ev.target;
        if (!(target instanceof HTMLElement)) return;
        const mode = target.dataset.mode;
        if (!mode) return;
        setMode(mode);
      });
      inputEl.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          sendMessage();
        }
      });

      appendMessage("I am here. What feels most alive in you right now?", "sol");
    </script>
  </body>
</html>
